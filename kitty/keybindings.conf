# kitty_mod comes from Kanata tab-hold: Shift + GUI.
kitty_mod cmd+shift
split_mod ctrl+shift+cmd
Meh ctrl+shift+alt

# ---------- Pane navigation (hjkl) ----------
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+l neighboring_window right

# ------------- Pane Splits ----------------------
# Split map mirrors the yabai placement layer as closely as kitty's
# tree-based splits allow.
map split_mod+j combine : goto_layout splits : launch --location=vsplit
map split_mod+l combine : goto_layout splits : launch --location=vsplit
map split_mod+i combine : goto_layout splits : launch --location=hsplit
map split_mod+o combine : goto_layout splits : launch --location=hsplit
map split_mod+, combine : goto_layout splits : launch --location=vsplit
map split_mod+. combine : goto_layout splits : launch --location=vsplit
map split_mod+1 combine : goto_layout splits : launch --location=vsplit
map split_mod+2 combine : goto_layout splits : launch --location=split
map split_mod+3 combine : goto_layout splits : launch --location=vsplit
map split_mod+u combine : goto_layout splits : launch --location=vsplit : resize_window wider 12
map split_mod+p combine : goto_layout splits : launch --location=vsplit : resize_window narrower 12
map split_mod+f toggle_fullscreen
map cmd+enter new_window
map Meh+l next_window
map Meh+h previous_window

# ---------- Word jump (Option+Left/Right) ----------
# Mirrors WezTerm: OPT+Left sends ESC+b; OPT+Right sends ESC+f [file:4]
map alt+h  send_text all \x1bb
map alt+l send_text all \x1bf

# ---------- Resize mode (simple direct binds) ----------
map ctrl+h resize_window narrower 5
map ctrl+l resize_window wider 5
map ctrl+j resize_window taller 5
map ctrl+k resize_window shorter 5

# ----------- Tab Management -------------
map kitty_mod+t new_tab
map kitty_mod+w close_tab
map Meh+t set_tab_title
map kitty_mod+right next_tab
map kitty_mod+left previous_tab

map Meh+1 goto_tab 1
map Meh+2 goto_tab 2
map Meh+3 goto_tab 3
map Meh+4 goto_tab 4
map Meh+5 goto_tab 5
map Meh+6 goto_tab 6
map Meh+7 goto_tab 7
map Meh+8 goto_tab 8
map Meh+9 goto_tab 9
