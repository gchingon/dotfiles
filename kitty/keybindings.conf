# Leader = Meh+Space (Meh = kitty_mod)
kitty_mod cmd+option

# ---------- Pane navigation (hjkl) ----------
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+l neighboring_window right

# Splits on \ and - (works best when current layout is "splits")
# ------------- Pane Splits ----------------------
map kitty_mod+\ launch --location=hsplit
map kitty_mod+- launch --location=vsplit
map cmd+enter new_window
map ctrl+cmd+l next_window
map ctrl+cmd+h previous_window

# ---------- Word jump (Option+Left/Right) ----------
# Mirrors WezTerm: OPT+Left sends ESC+b; OPT+Right sends ESC+f [file:4]
map alt+h  send_text all \x1bb
map alt+l send_text all \x1bf

# ---------- Resize mode (simple direct binds) ----------
map ctrl+h resize_window narrower 5
map ctrl+l resize_window wider 5
map ctrl+j resize_window taller 5
map ctrl+k resize_window shorter 5
