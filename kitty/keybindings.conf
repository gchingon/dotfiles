# Leader = Meh+Space (Meh = kitty_mod)
kitty_mod ctrl+alt+shift

# ---------- Pane navigation (hjkl) ----------
map kitty_mod+space>h neighboring_window left
map kitty_mod+space>j neighboring_window down
map kitty_mod+space>k neighboring_window up
map kitty_mod+space>l neighboring_window right

# Splits on \ and - (works best when current layout is "splits")
# ------------- Pane Splits ----------------------
map kitty_mod+space>\ launch --location=hsplit
map kitty_mod+space>- launch --location=vsplit

# ---------- Word jump (Option+Left/Right) ----------
# Mirrors WezTerm: OPT+Left sends ESC+b; OPT+Right sends ESC+f [file:4]
map alt+left  send_text all \x1bb
map alt+right send_text all \x1bf

# ---------- Resize mode (simple direct binds) ----------
# WezTerm has a resize key-table under LEADER+r [file:4]
# Kitty doesn’t have the same “key table” UX, so map direct resizes:
map ctrl+h resize_window narrower 3
map ctrl+l resize_window wider 3
map ctrl+j resize_window taller 3
map ctrl+k resize_window shorter 3

# ---------- Close pane ----------
# WezTerm: LEADER+w closes current pane (with confirm) [file:4]
# Kitty: close_window (no built-in confirm prompt)
map kitty_mod+space+w close_window
