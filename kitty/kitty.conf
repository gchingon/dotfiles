# Main entrypoint
include ./theme.conf
include ./keybindings.conf

hide_window_decorations titlebar-only

# Match your PATH prepend (/opt/homebrew/bin) 
env PATH=/opt/homebrew/bin:$PATH

# Cursor: Blinking bar (beam) similar to WezTerm 
cursor_shape beam
cursor_blink_interval 0.33

# Transparency like WezTerm 
background_opacity 0.80

# Optional: Kitty blur support varies by version/build; leave commented if it errors
# background_blur 30   # analogous intent to macos_window_background_blur = 30 

# Useful for the project picker script (kitty @ remote control)
allow_remote_control yes

# Convenience: let Kitty know what editor to use (also used by some kittens)
editor nvim
visual_bell_duration 0.2
enable_audio_bell no
visual_bell_color #FF0033

# Tab bar: closest built-in vibe to your powerline-ish status styling
tab_bar_style powerline
tab_powerline_style slanted

# BEGIN_KITTY_FONTS
font_family      family="MesloLGM Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 18.0
# END_KITTY_FONTS
