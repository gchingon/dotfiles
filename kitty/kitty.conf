# Main entrypoint
include ./theme.conf
include ./keybindings.conf

listen_on unix:/tmp/kitty

hide_window_decorations titlebar-only
confirm_os_window_close 0

# Match your PATH prepend (/opt/homebrew/bin) 
env PATH=/opt/homebrew/bin:$PATH
term xterm-kitty
shell zsh --login

# Cursor: Blinking bar (beam) similar to WezTerm 
cursor_shape beam
cursor_blink_interval 0.33 ease-in-out
cursor_underline_thickness 2.0
cursor_beam_thickness 1.5
cursor_stop_blinking_after 0
cursor_trail 1
cursor_trail_decay 0.05 1.25
cursor_trail_start_threshold 5

# Optional: Kitty blur support varies by version/build; leave commented if it errors
background_opacity 0.8
background_blur 6

# Useful for the project picker script (kitty @ remote control)
allow_remote_control yes

# Convenience: let Kitty know what editor to use (also used by some kittens)
editor nvim
visual_bell_duration 0.2
enable_audio_bell no
visual_bell_color #002100

# Tab bar: closest built-in vibe to your powerline-ish status styling
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{tab.active_wd.rsplit('/', 1)[-1]}"
shell_integration no-title

# ctrl+b>h/d/n/a/p/2 goto_session bindings
# ctrl+b>l goto_session -1  (previous) ERROR here as well
tab_bar_filter session:~ or session:^$

# BEGIN_KITTY_FONTS
font_family      family="MesloLGM Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 18.0
# END_KITTY_FONTS

# ── Cursor trail (longer than default) ───────────────────────────────────────
cursor_trail 1
cursor_trail_decay 0.05 0.9
cursor_trail_start_threshold 0

# ── Background blur + opacity ─────────────────────────────────────────────────
background_opacity 0.88
background_blur 12

# ── Copy on select ───────────────────────────────────────────────────────────
copy_on_select yes
# save_as_session I HAVE AN ERROR here on reload

# ── Pane navigation — pass ctrl+hjkl through to nvim transparently ───────────
# Requires: pip install kitty-vim-navigator OR clone knubie/vim-kitty-navigator
# Place pass_keys.py in ~/.config/kitty/
map ctrl+h kitten pass_keys.py left  ctrl+h "nvim"
map ctrl+j kitten pass_keys.py bottom ctrl+j "nvim"
map ctrl+k kitten pass_keys.py top   ctrl+k "nvim"
map ctrl+l kitten pass_keys.py right ctrl+l "nvim"
map ctrl+shift+h swap_with_window
