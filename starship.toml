"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
continuation_prompt = "[▸▹ ](dimmed white)"

# Left prompt: SSH identity + git counts + prompt char (git_status moved here) [web:107]
format = """($nix_shell$container)$cmd_duration$hostname$localip$username$git_metrics$git_status$character"""

# Right prompt: keep directory/time/etc, remove git_metrics + git_status [web:107]
right_format = "$directory$docker_context$memory_usage$status$os$sudo$battery$time"

[fill]
symbol = " "

[hostname]
ssh_only = true
ssh_symbol = "🌐 "
format = "[$ssh_symbol$hostname]($style) "
style = "bold green"
trim_at = "."

[localip]
ssh_only = true
disabled = false
format = "@ [$localipv4](bold magenta) "

[username]
style_user = "bright-yellow bold italic"
style_root = "purple bold italic"
show_always = false
disabled = false
format = "🕹️[$user]($style) "

[character]
format = "$symbol "
vimcmd_visual_symbol = "[▼](bold italic fg:#7B36FF)"
success_symbol = "[❯](bold italic bright-yellow)"
error_symbol = "[❯](italic red)"
vimcmd_symbol = "[■](italic dimmed green)"
vimcmd_replace_one_symbol = "◌"
vimcmd_replace_symbol = "□"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = "green italic"

[sudo]
format = "[$symbol]($style)"
style = "bold italic bright-purple"
symbol = "🔒 "
disabled = false

[directory]
home_symbol = "🏠"
truncation_length = 2
truncation_symbol = "… "
read_only = " ◈"
use_os_path_sep = true
style = "italic blue"
format = "[$path]($style)[$read_only]($read_only_style) "
repo_root_style = "bold blue"
repo_root_format = "[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[cmd_duration]
format = "[⏱️ $duration ](italic white)"

[jobs]
format = "[$symbol$number]($style) "
style = "white"
symbol = "[🛠️](blue italic)"

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%T"
utc_time_offset = "local"
style = "italic dimmed white"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "█"
charging_symbol = "[↑](italic bold green)"
discharging_symbol = "↓"
unknown_symbol = "░"
empty_symbol = "▃"

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 50
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 75
style = "italic dimmed yellow"

[git_metrics]
disabled = false
ignore_submodules = true
added_style = "italic green"
deleted_style = "italic red"
format = "([+${added}]($added_style) )([-${deleted}]($deleted_style) )"

[git_status]
disabled = false
format = "$modified"
modified = "[~${count}](italic yellow) "

# Disable “via … vX.Y.Z” noise everywhere [web:107]
[package]
disabled = true
[python]
disabled = true
[nodejs]
disabled = true
[rust]
disabled = true
[golang]
disabled = true
[java]
disabled = true
[lua]
disabled = true
[php]
disabled = true
[ruby]
disabled = true
[swift]
disabled = true
