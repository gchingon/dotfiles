# ~/2lab/compose/docker-compose.yml
services:
  # ==================
  # DATABASE
  # ==================
  
  # PostgreSQL - For Pastefy
  postgresql:
    image: docker.io/postgres:alpine
    container_name: postgresql
    environment:
      - POSTGRES_DB=homelab
      - POSTGRES_USER=homelab
      - POSTGRES_PASSWORD=secure-password
    volumes:
      - ./volumes/postgresql/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # ==================
  # MEDIA AUTOMATION (*ARR STACK)
  # ==================

  # Sonarr - TV Series Management
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=0
      - PGID=0
      - TZ=America/Los_Angeles
    volumes:
      - ./volumes/sonarr/config:/config
      - /Volumes/shows:/tv
      - /Volumes/kalisma:/downloads
    ports:
      - "8989:8989"
    restart: unless-stopped

  # Radarr - Movie Management
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=0
      - PGID=0
      - TZ=America/Los_Angeles
    volumes:
      - ./volumes/radarr/config:/config
      - /Volumes/movies:/movies
      - /Volumes/kalisma:/downloads
    ports:
      - "7878:7878"
    restart: unless-stopped

  # Prowlarr - Indexer Management
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=0
      - PGID=0
      - TZ=America/Los_Angeles
    volumes:
      - ./volumes/prowlarr/config:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  # Jellyseerr - Media Requests
  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=info
      - TZ=America/Los_Angeles
    volumes:
      - ./volumes/jellyseerr/config:/app/config
    ports:
      - "5055:5055"
    restart: unless-stopped

  # ==================
  # UTILITIES
  # ==================

  # Pastefy - Paste Service
  pastefy:
    image: docker.io/interaapps/pastefy
    container_name: pastefy
    environment:
      - HTTP_SERVER_PORT=80
      - DATABASE_DRIVER=postgresql
      - DATABASE_NAME=homelab
      - DATABASE_USER=homelab
      - DATABASE_PASSWORD=secure-password
      - DATABASE_HOST=postgresql
      - DATABASE_PORT=5432
      - AUTH_PROVIDER=NONE
      - SERVER_NAME=http://paste.2mini.local
    ports:
      - "8084:80"
    depends_on:
      - postgresql
    restart: unless-stopped

networks:
  default:
    driver: bridge
